<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Velvet Paws Cattery</title>
  <link rel="stylesheet" href="/assets/css/auth.css" />
</head>
<body>
  <header class="auth-header">
    <div class="brand">Velvet Paws Cattery</div>
    <nav>
      <a href="/login">Login</a>
      <a href="/register">Register</a>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-card">
      <h1>Welcome Back</h1>
      <p class="muted">Login once as admin or user using this same secure portal.</p>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" placeholder="Enter your password" required />
            <button id="toggle-password" type="button">Show</button>
          </div>
        </div>

        <button class="auth-btn" type="submit">Login</button>
        <p id="login-error" class="error"></p>
      </form>
      <p class="note">New customer? <a href="/register">Create your account</a></p>
    </section>
  </main>

  <script src="/assets/js/login.js"></script>
</body>
</html>
