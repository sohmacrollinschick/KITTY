<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP | Velvet Paws Cattery</title>
  <link rel="stylesheet" href="/assets/css/auth.css" />
</head>
<body>
  <header class="auth-header">
    <div class="brand">Velvet Paws Cattery</div>
    <nav>
      <a href="/login">Login</a>
      <a href="/register">Register</a>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-card">
      <h1>Enter Verification Code</h1>
      <p id="otp-helper" class="muted">Enter the 6-digit code from your email.</p>

      <form id="otp-form" novalidate>
        <input id="email" type="hidden" />
        <input id="flow" type="hidden" />

        <div class="field">
          <label for="otp">OTP Code</label>
          <input id="otp" name="otp" maxlength="6" inputmode="numeric" placeholder="123456" required />
        </div>

        <button class="auth-btn" type="submit">Verify OTP</button>
        <p id="otp-status" class="error"></p>
      </form>

      <p class="note">
        Didn't receive code?
        <a href="#" id="resend-otp">Resend OTP</a>
      </p>
    </section>
  </main>

  <script src="/assets/js/otp.js"></script>
</body>
</html>
