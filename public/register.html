<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Velvet Paws Cattery</title>
  <link rel="stylesheet" href="/assets/css/auth.css" />
</head>
<body>
  <header class="auth-header">
    <div class="brand">Velvet Paws Cattery</div>
    <nav>
      <a href="/login">Login</a>
      <a href="/register">Register</a>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-card">
      <h1>Create Account</h1>
      <p class="muted">Register as a normal user to access kittens and adoption pages.</p>
      <form id="register-form" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="Your full name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" placeholder="Strong password" required />
            <button id="toggle-password" type="button">Show</button>
          </div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrap">
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm password" required />
            <button id="toggle-confirm-password" type="button">Show</button>
          </div>
        </div>

        <button class="auth-btn" type="submit">Create Account</button>
        <p id="register-error" class="error"></p>
        <p id="register-success" class="success"></p>
      </form>
      <p class="note">Already registered? <a href="/login">Go to login</a></p>
    </section>
  </main>

  <script src="/assets/js/register.js"></script>
</body>
</html>
