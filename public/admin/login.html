<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Login</title><link rel="stylesheet" href="/assets/css/admin.css"></head>
<body>
<div class="login-shell">
  <div class="panel login-card">
    <h1>Admin Login</h1>
    <p style="color:#706353;margin-top:-6px;">Secure access to kittens, inquiries, reservations, CMS, and settings.</p>
    <form id="admin-login-form">
      <p><input name="email" type="email" placeholder="Admin Email" required></p>
      <p><input name="password" type="password" placeholder="Password" required></p>
      <button type="submit">Login</button>
    </form>
    <p id="login-status" style="color:#8d2c2c"></p>
    <p><a href="/" style="color:#7a5f38;">← Back to website</a></p>
  </div>
</div>
<script src="/assets/js/admin-login.js"></script>
</body></html>
