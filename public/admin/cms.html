<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CMS Content Manager</title><link rel="stylesheet" href="/assets/css/admin.css"></head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <h3>Admin Panel</h3>
    <a href="/admin/dashboard">Dashboard</a><a href="/admin/kittens">Manage Kittens</a><a href="/admin/users">Users</a><a href="/admin/inquiries">Inquiries</a><a href="/admin/reservations">Reservations</a><a href="/admin/testimonials">Testimonials</a><a class="active" href="/admin/cms">CMS</a><a href="/admin/settings">Settings</a>
    <button id="logout-btn" style="margin-top:12px;">Logout</button>
  </aside>
  <main class="content">
    <div class="panel"><h1>CMS Content Manager</h1><form id="cms-form">
      <p><label>Page Slug</label><select id="slug"></select></p>
      <p><label>Title</label><input id="title" required></p>
      <p><label>Body</label><textarea id="body" required></textarea></p>
      <p><label>Blocks (JSON)</label><textarea id="blocks" style="min-height:190px;"></textarea></p>
      <button type="submit">Save Content</button>
    </form></div>
  </main>
</div>
<script src="/assets/js/admin-common.js"></script><script src="/assets/js/admin-cms.js"></script>
</body></html>
