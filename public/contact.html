<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contact</title><link rel="stylesheet" href="/assets/css/main.css"></head>
<body>
<header class="site-header"><div class="container nav-wrap"><div class="brand"><img data-logo alt="logo" style="height:30px;display:none;" onload="this.style.display='block'"> <span data-business-name>Velvet Paws Cattery</span></div><nav class="nav-links"></nav></div></header>
<section class="section"><div class="container"><h1>Contact Us</h1><p class="muted">We reply quickly and help you choose the best match.</p>
<form id="contact-form" class="card" style="padding:16px;">
<div class="form-grid">
<input name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone">
<input name="kittenInterestedIn" placeholder="Kitten Interested In">
<textarea class="full" name="message" placeholder="Message" required></textarea>
<div class="full"><button class="btn btn-primary" type="submit">Send Inquiry</button></div>
</div>
<div id="contact-status" class="muted" style="margin-top:10px;"></div>
</form></div></section>
<footer><div class="container">© <span data-business-name></span> • <span data-contact-email></span> • <span data-phone></span></div></footer>
<script src="/assets/js/site.js"></script><script src="/assets/js/contact.js"></script>
</body></html>
